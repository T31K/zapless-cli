name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build macOS binary
        run: bun build src/index.ts --compile --target=bun-darwin-arm64 --outfile dist/clawnect-macos

      - name: Build Linux binary
        run: bun build src/index.ts --compile --target=bun-linux-x64 --outfile dist/clawnect-linux

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/clawnect-macos
            dist/clawnect-linux
