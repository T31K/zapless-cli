name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build macOS binary
        run: bun build src/index.ts --compile --target=bun-darwin-arm64 --define "process.env.ZAPLESS_SERVER='${{ secrets.ZAPLESS_SERVER_URL }}'" --outfile dist/zapless-macos

      - name: Build Linux binary
        run: bun build src/index.ts --compile --target=bun-linux-x64 --define "process.env.ZAPLESS_SERVER='${{ secrets.ZAPLESS_SERVER_URL }}'" --outfile dist/zapless-linux

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/zapless-macos
            dist/zapless-linux
